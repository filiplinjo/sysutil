<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Free file size converter. Instantly convert between bytes, KB, MB, GB, TB, PB. Perfect for developers reading df, du, ls -lh output.">
<meta name="keywords" content="file size converter, bytes to mb, kb to mb, gb to tb, linux file size, bytes converter, storage calculator">
<title>File Size Converter - Bytes, KB, MB, GB, TB Calculator | SysUtil</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;padding:20px}
  .container{max-width:780px;margin:0 auto}
  nav{text-align:center;margin-bottom:24px;display:flex;flex-wrap:wrap;justify-content:center;gap:6px}
  nav a{color:#94a3b8;text-decoration:none;font-size:0.85rem;padding:5px 12px;border:1px solid #2d3148;border-radius:6px;transition:all 0.15s;background:#1e2130}
  nav a:hover,nav a.active{border-color:#6366f1;color:#a5b4fc;background:#1a1d2e}
  .nav-divider{width:1px;background:#2d3148;margin:0 4px}
  header{text-align:center;padding:40px 20px 20px}
  header h1{font-size:2.2rem;font-weight:700;color:#fff;margin-bottom:8px}
  header h1 span{color:#6366f1}
  header p{color:#94a3b8;font-size:1rem;max-width:500px;margin:0 auto}

  /* Input */
  .input-card{background:#1e2130;border:1px solid #2d3148;border-radius:16px;padding:28px;margin:24px 0}
  .input-row{display:flex;gap:12px;align-items:center}
  .num-input{background:#0f1117;border:1px solid #2d3148;border-radius:10px;padding:14px 18px;color:#a5b4fc;font-family:monospace;font-size:1.4rem;flex:1;outline:none;transition:border 0.15s;-moz-appearance:textfield}
  .num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button{-webkit-appearance:none}
  .num-input:focus{border-color:#6366f1}
  .unit-select{background:#0f1117;border:1px solid #2d3148;border-radius:10px;padding:14px 16px;color:#e2e8f0;font-size:1rem;outline:none;cursor:pointer;min-width:100px}
  .unit-select:focus{border-color:#6366f1}

  /* Results grid */
  .results{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin:24px 0}
  .result-card{background:#1e2130;border:1px solid #2d3148;border-radius:12px;padding:18px 20px;cursor:pointer;transition:all 0.15s;position:relative}
  .result-card:hover{border-color:#6366f1;background:#1a1d2e}
  .result-card.active-unit{border-color:#6366f1;background:#1a1d2e}
  .result-label{font-size:0.75rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
  .result-value{font-family:monospace;font-size:1.2rem;font-weight:700;color:#a5b4fc;word-break:break-all}
  .result-full{font-size:0.78rem;color:#475569;margin-top:4px}
  .copy-hint{position:absolute;top:8px;right:10px;font-size:0.7rem;color:#374151;opacity:0}
  .result-card:hover .copy-hint{opacity:1}
  .copied-flash{position:absolute;top:8px;right:10px;font-size:0.7rem;color:#22c55e}

  /* Common sizes reference */
  .reference{background:#1e2130;border:1px solid #2d3148;border-radius:16px;padding:24px;margin-bottom:24px}
  .reference h3{font-size:0.85rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:16px}
  .ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
  .ref-btn{background:#0f1117;border:1px solid #2d3148;border-radius:8px;padding:10px 14px;cursor:pointer;text-align:left;transition:all 0.15s;display:flex;justify-content:space-between;align-items:center}
  .ref-btn:hover{border-color:#6366f1;background:#1a1d2e}
  .ref-name{font-size:0.85rem;color:#94a3b8}
  .ref-size{font-family:monospace;font-size:0.85rem;color:#6366f1;font-weight:600}

  /* df/du parser */
  .parser-card{background:#1e2130;border:1px solid #2d3148;border-radius:16px;padding:24px;margin-bottom:24px}
  .parser-card h3{font-size:0.85rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px}
  .parse-input{background:#0f1117;border:1px solid #2d3148;border-radius:10px;padding:12px 16px;color:#a5b4fc;font-family:monospace;font-size:0.9rem;width:100%;outline:none;transition:border 0.15s}
  .parse-input:focus{border-color:#6366f1}
  .parse-result{margin-top:12px;font-family:monospace;font-size:0.9rem;color:#e2e8f0;min-height:24px}
  .parse-result span{color:#6366f1;font-weight:700}

  footer{text-align:center;padding:20px;color:#374151;font-size:0.85rem}
  footer a{color:#6366f1;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>File Size <span>Converter</span></h1>
    <p>Convert between bytes, KB, MB, GB and TB instantly. Click any result to copy it.</p>
  </header>
  <nav>
    <a href="/">chmod</a>
    <a href="/cron">cron</a>
    <a href="/regex">regex</a>
    <a href="/base64">base64</a>
    <a href="/file-size" class="active">linux</a>
    <a href="/json">json</a>
    <a href="/password">password</a>
    <a href="/diff">diff</a>
    <div class="nav-divider"></div>
    <a href="/blog">guides</a>
  </nav>

  <!-- Input -->
  <div class="input-card">
    <div class="input-row">
      <input class="num-input" type="number" id="numInput" value="1" min="0" oninput="convert()">
      <select class="unit-select" id="unitSelect" onchange="convert()">
        <option value="B">Bytes</option>
        <option value="KB">KB</option>
        <option value="MB" selected>MB</option>
        <option value="GB">GB</option>
        <option value="TB">TB</option>
        <option value="PB">PB</option>
      </select>
    </div>
  </div>

  <!-- Results -->
  <div class="results" id="results"></div>

  <!-- Common sizes -->
  <div class="reference">
    <h3>Common sizes — click to convert</h3>
    <div class="ref-grid">
      <button class="ref-btn" onclick="setVal(1440,'B')"><span class="ref-name">Floppy disk</span><span class="ref-size">1.44 MB</span></button>
      <button class="ref-btn" onclick="setVal(700,'MB')"><span class="ref-name">CD-ROM</span><span class="ref-size">700 MB</span></button>
      <button class="ref-btn" onclick="setVal(4.7,'GB')"><span class="ref-name">DVD</span><span class="ref-size">4.7 GB</span></button>
      <button class="ref-btn" onclick="setVal(1,'GB')"><span class="ref-name">1 GB RAM</span><span class="ref-size">1 GB</span></button>
      <button class="ref-btn" onclick="setVal(512,'GB')"><span class="ref-name">SSD (small)</span><span class="ref-size">512 GB</span></button>
      <button class="ref-btn" onclick="setVal(2,'TB')"><span class="ref-name">HDD (typical)</span><span class="ref-size">2 TB</span></button>
      <button class="ref-btn" onclick="setVal(100,'MB')"><span class="ref-name">Large photo</span><span class="ref-size">100 MB</span></button>
      <button class="ref-btn" onclick="setVal(4,'GB')"><span class="ref-name">4K video/min</span><span class="ref-size">4 GB</span></button>
      <button class="ref-btn" onclick="setVal(1,'MB')"><span class="ref-name">1 MB</span><span class="ref-size">1,048,576 B</span></button>
      <button class="ref-btn" onclick="setVal(1,'GB')"><span class="ref-name">1 GB</span><span class="ref-size">1,073,741,824 B</span></button>
    </div>
  </div>

  <!-- df/du parser -->
  <div class="parser-card">
    <h3>Parse df / du output</h3>
    <input class="parse-input" id="parseInput" placeholder="Paste a size like: 1.5G, 512M, 2.3T, 4096K" oninput="parseSize()">
    <div class="parse-result" id="parseResult"></div>
  </div>

  <footer>
    <p>Free tools by <a href="/">SysUtil.dev</a></p>
  </footer>
</div>

<script>
var UNITS = [
  {key:'B',  label:'Bytes',     full:'Bytes',      factor:1},
  {key:'KB', label:'KB',        full:'Kilobytes',   factor:1024},
  {key:'MB', label:'MB',        full:'Megabytes',   factor:1024*1024},
  {key:'GB', label:'GB',        full:'Gigabytes',   factor:1024*1024*1024},
  {key:'TB', label:'TB',        full:'Terabytes',   factor:1024*1024*1024*1024},
  {key:'PB', label:'PB',        full:'Petabytes',   factor:1024*1024*1024*1024*1024},
];

function fmt(n) {
  if(n === 0) return '0';
  if(n < 1) return n.toPrecision(4).replace(/\.?0+$/,'');
  if(n >= 1e15) return n.toExponential(3);
  return n.toLocaleString('en-US', {maximumFractionDigits: n < 10 ? 6 : n < 1000 ? 4 : 2});
}

function fmtBytes(b) {
  if(b === 0) return '0 B';
  if(b < 1024) return b + ' B';
  var i = Math.floor(Math.log(b) / Math.log(1024));
  var units = ['B','KB','MB','GB','TB','PB'];
  return (b / Math.pow(1024, i)).toFixed(2).replace(/\.?0+$/,'') + ' ' + units[i];
}

function convert() {
  var val = parseFloat(document.getElementById('numInput').value) || 0;
  var unit = document.getElementById('unitSelect').value;
  var factor = UNITS.find(u => u.key === unit).factor;
  var bytes = val * factor;

  var html = UNITS.map(function(u) {
    var converted = bytes / u.factor;
    var isActive = u.key === unit ? ' active-unit' : '';
    return '<div class="result-card'+isActive+'" onclick="copyVal(this, \''+fmt(converted)+' '+u.key+'\')">' +
      '<div class="result-label">'+u.full+'</div>' +
      '<div class="result-value">'+fmt(converted)+'</div>' +
      '<div class="result-full">'+u.key+'</div>' +
      '<span class="copy-hint">click to copy</span>' +
    '</div>';
  }).join('');
  document.getElementById('results').innerHTML = html;
}

function copyVal(card, text) {
  navigator.clipboard.writeText(text).then(function(){
    var hint = card.querySelector('.copy-hint');
    hint.className = 'copied-flash';
    hint.textContent = '✓ copied';
    setTimeout(function(){ hint.className='copy-hint'; hint.textContent='click to copy'; }, 1500);
  });
}

function setVal(n, unit) {
  document.getElementById('numInput').value = n;
  document.getElementById('unitSelect').value = unit;
  convert();
}

function parseSize() {
  var raw = document.getElementById('parseInput').value.trim();
  var el = document.getElementById('parseResult');
  if(!raw) { el.innerHTML=''; return; }

  var m = raw.match(/^([\d.]+)\s*([KMGTP]i?B?|[BKMGTP])?$/i);
  if(!m) { el.innerHTML='<span style="color:#ef4444">Could not parse — try: 1.5G, 512M, 4096K</span>'; return; }

  var num = parseFloat(m[1]);
  var u = (m[2]||'B').toUpperCase().replace('IB','').replace('I','');
  var map = {B:1,K:1024,M:1024*1024,G:1024*1024*1024,T:1024*1024*1024*1024,P:1024*1024*1024*1024*1024};
  var key = u[0];
  if(!map[key]) { el.innerHTML='<span style="color:#ef4444">Unknown unit</span>'; return; }

  var bytes = num * map[key];
  el.innerHTML = '<span>'+fmtBytes(bytes)+'</span> = <span>'+Math.round(bytes).toLocaleString()+'</span> bytes';
}

convert();
</script>
</body>
</html>
