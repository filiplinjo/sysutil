function flag(code) { return FLAGS[code] || 'рҹҢҗ'; }

async function doLookup(ip) {
  if (ip !== undefined) document.getElementById('ipInput').value = ip;
  const q = document.getElementById('ipInput').value.trim();
  const btn = document.getElementById('lookupBtn');
  const result = document.getElementById('result');

  btn.disabled = true;
  result.innerHTML = '<div class="spinner">Looking upвҖҰ</div>';

  try {
    const url = q ? `/api/ip?q=${encodeURIComponent(q)}` : '/api/ip';
    const data = await fetch(url).then(r => r.json());
    if (data.error) throw new Error(data.error);

    const mapsUrl = data.ll ? `https://www.google.com/maps?q=${data.ll[0]},${data.ll[1]}` : null;

    result.innerHTML = `
      <div class="result-card">
        <div class="ip-display">${flag(data.country)} ${data.ip}</div>
        <div class="ip-label">${data.auto ? 'Your IP address' : 'IP lookup result'}${data.cached ? ' В· cached' : ''}</div>
        <div class="info-grid">
          <div class="info-item">
            <div class="info-item-label">Country</div>
            <div class="info-item-value">${flag(data.country)} ${data.country || 'вҖ”'}</div>
          </div>
          <div class="info-item">
            <div class="info-item-label">Region</div>
            <div class="info-item-value">${data.region || 'вҖ”'}</div>
          </div>
          <div class="info-item">
            <div class="info-item-label">City</div>
            <div class="info-item-value">${data.city || 'вҖ”'}</div>
          </div>
          <div class="info-item">
            <div class="info-item-label">Timezone</div>
            <div class="info-item-value">${data.timezone || 'вҖ”'}</div>
          </div>
          <div class="info-item">
            <div class="info-item-label">Coordinates</div>
            <div class="info-item-value">${data.ll ? `<a href="${mapsUrl}" target="_blank">${data.ll[0]}, ${data.ll[1]} вҶ—</a>` : 'вҖ”'}</div>
          </div>
          <div class="info-item">
            <div class="info-item-label">EU Member</div>
            <div class="info-item-value">${data.eu ? '<span class="badge-eu">вң“ EU</span>' : 'No'}</div>
          </div>

      </div>`;
  } catch (e) {
    result.innerHTML = `<div class="error-box">Error: ${e.message}</div>`;
  }
  btn.disabled = false;
}

doLookup('');
</script>
