<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Free DNS lookup and WHOIS tool. Query A, AAAA, MX, NS, TXT, CNAME, SOA records and get full WHOIS registration data for any domain or IP address.">
<meta name="keywords" content="dns lookup, whois lookup, dns records, mx records, txt records, nameserver lookup, domain lookup, ip whois">
<title>DNS & WHOIS Lookup | SysUtil</title>
<meta property="og:type" content="website">
<meta property="og:site_name" content="SysUtil">
<meta property="og:title" content="DNS & WHOIS Lookup | SysUtil">
<meta property="og:description" content="Free DNS lookup and WHOIS tool. Query A, AAAA, MX, NS, TXT, CNAME, SOA records and get full WHOIS registration data for any domain or IP address.">
<meta property="og:url" content="https://sysutil.dev/dns">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="DNS & WHOIS Lookup | SysUtil">
<meta name="twitter:description" content="Free DNS lookup and WHOIS tool. Query A, AAAA, MX, NS, TXT, CNAME, SOA records and get full WHOIS registration data for any domain or IP address.">
<link rel="stylesheet" href="/styles.css?v=2">
<style>
  .container { max-width: 900px; }

  .lookup-card {
    background: #1e2130;
    border: 1px solid #2d3148;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .lookup-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .lookup-input {
    flex: 1;
    background: #0f1117;
    border: 1px solid #2d3148;
    color: #e2e8f0;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 1rem;
    font-family: 'Segoe UI', system-ui, sans-serif;
    outline: none;
    transition: border 0.2s;
    min-width: 0;
  }
  .lookup-input:focus { border-color: #6366f1; }
  .lookup-input::placeholder { color: #374151; }

  .btn-lookup {
    background: #6366f1;
    border: none;
    color: #fff;
    padding: 12px 24px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: 'Segoe UI', system-ui, sans-serif;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-lookup:hover { background: #4f46e5; }
  .btn-lookup:disabled { background: #2d3148; color: #475569; cursor: default; }

  .examples {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .examples-label { font-size: 0.78rem; color: #475569; }
  .example-chip {
    background: #0f1117;
    border: 1px solid #2d3148;
    color: #64748b;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: monospace;
  }
  .example-chip:hover { border-color: #6366f1; color: #a5b4fc; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid #2d3148;
    margin-bottom: 20px;
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: #64748b;
    padding: 10px 20px;
    cursor: pointer;
    font-size: 0.88rem;
    font-weight: 600;
    font-family: 'Segoe UI', system-ui, sans-serif;
    transition: all 0.15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: #94a3b8; }
  .tab-btn.active { color: #a5b4fc; border-bottom-color: #6366f1; }

  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* DNS Records */
  .rec-group {
    background: #1e2130;
    border: 1px solid #2d3148;
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .rec-group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .rec-group-header:hover { background: rgba(99,102,241,0.05); }
  .rec-type-badge {
    background: #0f1117;
    border: 1px solid #2d3148;
    color: #a5b4fc;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 5px;
    letter-spacing: 0.05em;
    min-width: 52px;
    text-align: center;
  }
  .rec-group-title { color: #94a3b8; font-size: 0.85rem; flex: 1; }
  .rec-count { color: #475569; font-size: 0.78rem; }
  .rec-chevron { color: #475569; font-size: 0.75rem; transition: transform 0.2s; }
  .rec-group.open .rec-chevron { transform: rotate(180deg); }

  .rec-group-body {
    display: none;
    padding: 0 18px 16px;
    border-top: 1px solid #1a1d2e;
  }
  .rec-group.open .rec-group-body { display: block; }

  .rec-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid #1a1d2e;
    font-size: 0.85rem;
  }
  .rec-row:last-child { border-bottom: none; }
  .rec-value {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    color: #e2e8f0;
    flex: 1;
    word-break: break-all;
    line-height: 1.5;
  }
  .rec-meta { color: #475569; font-size: 0.78rem; white-space: nowrap; }
  .rec-copy {
    background: none;
    border: none;
    color: #475569;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.75rem;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .rec-copy:hover { color: #a5b4fc; background: rgba(99,102,241,0.1); }

  /* SOA special layout */
  .soa-grid { display: grid; grid-template-columns: 120px 1fr; gap: 4px 12px; font-size: 0.82rem; }
  .soa-key { color: #64748b; }
  .soa-val { font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; color: #e2e8f0; }

  /* WHOIS */
  .whois-section {
    background: #1e2130;
    border: 1px solid #2d3148;
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 14px;
  }
  .whois-section h3 {
    font-size: 0.72rem;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 14px;
  }
  .whois-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .whois-table td { padding: 8px 0; border-bottom: 1px solid #1a1d2e; vertical-align: top; }
  .whois-table tr:last-child td { border-bottom: none; }
  .whois-key { color: #64748b; width: 160px; padding-right: 16px; white-space: nowrap; }
  .whois-val { color: #94a3b8; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 0.82rem; word-break: break-all; }
  .whois-val.mono-list { line-height: 1.9; }

  .status-chip {
    display: inline-block;
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.2);
    color: #a5b4fc;
    font-size: 0.75rem;
    padding: 2px 10px;
    border-radius: 12px;
    margin: 2px 4px 2px 0;
    font-family: monospace;
    word-break: break-all;
  }

  /* Meta bar */
  .result-meta {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 18px;
    padding: 12px 16px;
    background: #1e2130;
    border: 1px solid #2d3148;
    border-radius: 10px;
    font-size: 0.82rem;
  }
  .result-meta-item { color: #475569; }
  .result-meta-item strong { color: #94a3b8; }
  .result-cached { margin-left: auto; color: #475569; font-size: 0.75rem; }

  /* States */
  .state-loading {
    text-align: center;
    padding: 48px 24px;
    color: #475569;
  }
  .spinner {
    display: inline-block;
    width: 28px; height: 28px;
    border: 2px solid #2d3148;
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .state-empty {
    text-align: center;
    padding: 48px 24px;
    color: #475569;
    font-size: 0.9rem;
  }
  .state-empty .big-icon { font-size: 2.5rem; margin-bottom: 12px; }

  .error-box {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.25);
    color: #fca5a5;
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 0.88rem;
  }

  .no-records {
    color: #374151;
    font-size: 0.82rem;
    font-style: italic;
    padding: 12px 0 4px;
  }
</style>
</head>
<body>

<script src="/nav.js?v=2"></script>

<div class="container">
  <header class="page-header">
    <h1>DNS <span>&amp; WHOIS</span></h1>
    <p>Query DNS records and registration data for any domain or IP address. Results fetched live from authoritative servers.</p>
  </header>

  <div class="lookup-card">
    <div class="lookup-row">
      <input type="text" class="lookup-input" id="queryInput"
        placeholder="example.com or 8.8.8.8"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        onkeydown="if(event.key==='Enter') doLookup()">
      <button class="btn-lookup" id="lookupBtn" onclick="doLookup()">Look up</button>
    </div>
    <div class="examples">
      <span class="examples-label">Try:</span>
      <span class="example-chip" onclick="setExample('github.com')">github.com</span>
      <span class="example-chip" onclick="setExample('google.com')">google.com</span>
      <span class="example-chip" onclick="setExample('cloudflare.com')">cloudflare.com</span>
      <span class="example-chip" onclick="setExample('8.8.8.8')">8.8.8.8</span>
      <span class="example-chip" onclick="setExample('1.1.1.1')">1.1.1.1</span>
    </div>
  </div>

  <div id="resultArea">
    <div class="state-empty">
      <div class="big-icon">🌐</div>
      Enter a domain or IP address above to look up DNS records and WHOIS data.
    </div>
  </div>

  <footer><p>Free tools by <a href="/">SysUtil.dev</a></p></footer>
</div>

<script>
const API = '/api'; // proxied by nginx — same origin, no CORS issue

function setExample(val) {
  document.getElementById('queryInput').value = val;
  doLookup();
}

async function doLookup() {
  const q   = document.getElementById('queryInput').value.trim();
  const btn = document.getElementById('lookupBtn');
  const out = document.getElementById('resultArea');

  if (!q) return;

  btn.disabled   = true;
  btn.textContent = 'Looking up…';
  out.innerHTML  = '<div class="state-loading"><div class="spinner"></div><div>Querying DNS and WHOIS…</div></div>';

  try {
    const [dnsRes, whoisRes] = await Promise.allSettled([
      fetch(API + '/dns?q='   + encodeURIComponent(q)).then(r => r.json()),
      fetch(API + '/whois?q=' + encodeURIComponent(q)).then(r => r.json()),
    ]);

    const dnsData   = dnsRes.status   === 'fulfilled' ? dnsRes.value   : null;
    const whoisData = whoisRes.status === 'fulfilled' ? whoisRes.value : null;

    if (dnsData?.error && whoisData?.error) {
      out.innerHTML = '<div class="error-box"><strong>Lookup failed</strong> — ' + esc(dnsData.error) + '</div>';
      return;
    }

    renderResults(q, dnsData, whoisData);
  } catch(e) {
    out.innerHTML = '<div class="error-box"><strong>Network error</strong> — ' + esc(e.message) + '</div>';
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Look up';
  }
}

function renderResults(q, dns, whois) {
  const cached = (dns?.cached || whois?.cached) ? '<span class="result-cached">⚡ cached</span>' : '';
  const isIP   = dns?.isIP;

  let html = `<div class="result-meta">
    <div class="result-meta-item"><strong>Query</strong> ${esc(q)}</div>
    ${dns?.ts ? `<div class="result-meta-item"><strong>Time</strong> ${new Date(dns.ts).toLocaleTimeString()}</div>` : ''}
    ${cached}
  </div>`;

  // Tabs
  html += `<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('dns',this)">DNS Records</button>
    <button class="tab-btn" onclick="switchTab('whois',this)">WHOIS</button>
  </div>`;

  // DNS pane
  html += `<div class="tab-pane active" id="tab-dns">`;
  if (dns?.error) {
    html += `<div class="error-box">${esc(dns.error)}</div>`;
  } else if (dns?.records) {
    const records = dns.records;
    const hasAny  = Object.values(records).some(v => v && (Array.isArray(v) ? v.length > 0 : true));
    if (!hasAny) {
      html += `<div class="state-empty"><div class="big-icon">🔍</div>No DNS records found for ${esc(q)}.</div>`;
    } else {
      if (isIP) {
        html += renderRecordGroup('PTR', 'Reverse DNS', records.PTR, r => ({ value: r }));
      } else {
        html += renderRecordGroup('A',     'IPv4 Addresses',     records.A,     r => ({ value: r }));
        html += renderRecordGroup('AAAA',  'IPv6 Addresses',     records.AAAA,  r => ({ value: r }));
        html += renderRecordGroup('CNAME', 'Canonical Name',     records.CNAME, r => ({ value: r }));
        html += renderRecordGroup('MX',    'Mail Exchangers',    records.MX,    r => ({ value: r.exchange, meta: 'priority ' + r.priority }));
        html += renderRecordGroup('NS',    'Name Servers',       records.NS,    r => ({ value: r }));
        html += renderRecordGroup('TXT',   'TXT Records',        records.TXT,   r => ({ value: r }));
        html += renderRecordGroup('CAA',   'CAA Records',        records.CAA,   r => ({ value: r.value, meta: r.critical + ' ' + r.issue }));
        if (records.SOA) html += renderSOA(records.SOA);
      }
    }
  } else {
    html += `<div class="state-empty">DNS data unavailable.</div>`;
  }
  html += `</div>`;

  // WHOIS pane
  html += `<div class="tab-pane" id="tab-whois">`;
  if (whois?.error) {
    html += `<div class="error-box">${esc(whois.error)}</div>`;
  } else if (whois?.parsed) {
    html += renderWhois(whois.parsed, isIP);
  } else {
    html += `<div class="state-empty">WHOIS data unavailable.</div>`;
  }
  html += `</div>`;

  document.getElementById('resultArea').innerHTML = html;

  // Auto-open first populated DNS group
  document.querySelectorAll('.rec-group').forEach((g, i) => {
    if (i === 0) g.classList.add('open');
  });
}

function renderRecordGroup(type, title, records, mapper) {
  if (!records || !records.length) return '';
  const count  = records.length;
  const typeId = 'grp-' + type;
  let rows = '';
  records.forEach(r => {
    const { value, meta } = mapper(r);
    rows += `<div class="rec-row">
      <div class="rec-value">${esc(value)}</div>
      ${meta ? `<div class="rec-meta">${esc(meta)}</div>` : ''}
      <button class="rec-copy" onclick="copyVal(this,'${esc(value)}')">copy</button>
    </div>`;
  });
  return `<div class="rec-group" id="${typeId}">
    <div class="rec-group-header" onclick="toggleGroup('${typeId}')">
      <span class="rec-type-badge">${type}</span>
      <span class="rec-group-title">${title}</span>
      <span class="rec-count">${count} record${count !== 1 ? 's' : ''}</span>
      <span class="rec-chevron">▼</span>
    </div>
    <div class="rec-group-body">${rows}</div>
  </div>`;
}

function renderSOA(soa) {
  return `<div class="rec-group" id="grp-SOA">
    <div class="rec-group-header" onclick="toggleGroup('grp-SOA')">
      <span class="rec-type-badge">SOA</span>
      <span class="rec-group-title">Start of Authority</span>
      <span class="rec-count">1 record</span>
      <span class="rec-chevron">▼</span>
    </div>
    <div class="rec-group-body">
      <div class="soa-grid" style="margin-top:8px">
        <span class="soa-key">Primary NS</span><span class="soa-val">${esc(soa.nsname || '')}</span>
        <span class="soa-key">Admin email</span><span class="soa-val">${esc(soa.hostmaster || '')}</span>
        <span class="soa-key">Serial</span><span class="soa-val">${esc(String(soa.serial || ''))}</span>
        <span class="soa-key">Refresh</span><span class="soa-val">${esc(String(soa.refresh || ''))}s</span>
        <span class="soa-key">Retry</span><span class="soa-val">${esc(String(soa.retry || ''))}s</span>
        <span class="soa-key">Expire</span><span class="soa-val">${esc(String(soa.expire || ''))}s</span>
        <span class="soa-key">Min TTL</span><span class="soa-val">${esc(String(soa.minttl || ''))}s</span>
      </div>
    </div>
  </div>`;
}

function renderWhois(p, isIP) {
  let html = '';

  if (!isIP) {
    // Domain registration info
    html += `<div class="whois-section"><h3>Registration</h3><table class="whois-table">`;
    if (p.domainName)   html += row('Domain',     p.domainName);
    if (p.registrar)    html += row('Registrar',  p.registrar);
    if (p.created)      html += row('Registered', fmtDate(p.created));
    if (p.updated)      html += row('Updated',    fmtDate(p.updated));
    if (p.expires)      html += row('Expires',    fmtDateWithAge(p.expires));
    if (p.dnssec)       html += row('DNSSEC',     p.dnssec);
    html += `</table></div>`;

    if (p.status?.length) {
      html += `<div class="whois-section"><h3>Domain Status</h3>`;
      html += p.status.map(s => {
        // Strip the URL part from status strings like "clientDeleteProhibited https://..."
        const label = s.split(' ')[0];
        return `<span class="status-chip">${esc(label)}</span>`;
      }).join('');
      html += `</div>`;
    }

    if (p.nameservers?.length) {
      html += `<div class="whois-section"><h3>Name Servers</h3><table class="whois-table">`;
      p.nameservers.forEach(ns => { html += row('', ns.toLowerCase()); });
      html += `</table></div>`;
    }
  } else {
    // IP / network info
    html += `<div class="whois-section"><h3>Network Info</h3><table class="whois-table">`;
    if (p.domainName || p.netname) html += row('Network',      p.netname || p.domainName);
    if (p.orgName)   html += row('Organisation', p.orgName);
    if (p.country)   html += row('Country',      p.country);
    if (p.created)   html += row('Allocated',    fmtDate(p.created));
    if (p.updated)   html += row('Updated',      fmtDate(p.updated));
    if (p.abuse)     html += row('Abuse contact',p.abuse);
    html += `</table></div>`;
  }

  const hasAny = Object.values(p).some(v => v && (!Array.isArray(v) || v.length));
  if (!hasAny) {
    html = `<div class="state-empty"><div class="big-icon">📋</div>No WHOIS data returned for this query.</div>`;
  }

  return html;
}

function row(key, val) {
  if (!val) return '';
  return `<tr><td class="whois-key">${esc(key)}</td><td class="whois-val">${esc(String(val))}</td></tr>`;
}

function fmtDate(s) {
  if (!s) return '';
  try {
    const d = new Date(s);
    if (isNaN(d)) return s;
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) + ' (' + d.getFullYear() + ')';
  } catch { return s; }
}

function fmtDateWithAge(s) {
  if (!s) return '';
  try {
    const d    = new Date(s);
    if (isNaN(d)) return s;
    const diff = d - Date.now();
    const base = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    if (diff < 0) return base + ' — expired';
    const days = Math.floor(diff / 86400000);
    if (days < 30)  return base + ` — expires in ${days} day${days!==1?'s':''}`;
    const months = Math.floor(days / 30);
    if (months < 24) return base + ` — expires in ${months} month${months!==1?'s':''}`;
    return base + ` — expires in ${Math.floor(months/12)} year${Math.floor(months/12)!==1?'s':''}`;
  } catch { return s; }
}

function toggleGroup(id) {
  document.getElementById(id).classList.toggle('open');
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const pane = document.getElementById('tab-' + name);
  if (pane) pane.classList.add('active');
}

async function copyVal(btn, val) {
  try {
    await navigator.clipboard.writeText(val);
    const orig = btn.textContent;
    btn.textContent = 'copied!';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  } catch {}
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Check for ?q= in URL on load
(function() {
  const params = new URLSearchParams(location.search);
  const q = params.get('q');
  if (q) {
    document.getElementById('queryInput').value = q;
    doLookup();
  }
})();
</script>
</body>
</html>
